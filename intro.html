<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Villa — VR Experience</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor"></div>
  <div class="cursor-ring"></div>

  <!-- Loading bar -->
  <div class="load-bar"></div>

  <!-- Transition overlay -->
  <div id="transition-overlay"></div>

  <!-- Background -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="grain"></div>

  <!-- Decorative lines & corners -->
  <div class="line-top"></div>
  <div class="line-left"></div>
  <div class="line-right"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Header -->
  <header class="header">
    <div class="logo">Apex Villa</div>
    <div class="nav-label">Virtual Reality Experience</div>
    <div class="nav-label" id="live-time">00:00</div>
  </header>

  <!-- Main Intro Content -->
  <main id="intro-screen">
    <p class="eyebrow">A-Frame · WebVR · 3D Architecture</p>

    <h1 class="main-title">
      Apex<br><em>Palace</em>
    </h1>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <p class="subtitle">Luxury Living — Virtually Realized</p>

    <a href="index.html" class="enter-btn">
      Enter Experience
      <span class="arrow">→</span>
    </a>

    <div class="features">
      <div class="pill">3 Rooms</div>
      <div class="pill">Swimming Pool</div>
      <div class="pill">VR Ready</div>
      <div class="pill">WASD Navigation</div>
    </div>
  </main>

  <!-- Bottom info bar -->
  <footer class="bottom-info">
    <div class="info-block">
      <span class="info-label">Built by</span>
      <span class="info-value">Shikuran Adam</span>
    </div>
    <div class="info-block" style="text-align:center;">
      <span class="info-label">Technology</span>
      <span class="info-value">A-Frame WebVR</span>
    </div>
    <div class="info-block" style="text-align:right;">
      <span class="info-label">Project</span>
      <span class="info-value">Computer Graphics · 2026</span>
    </div>
  </footer>

  <script src="js/intro.js"></script>
</body>
</html>
