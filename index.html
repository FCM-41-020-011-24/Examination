<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apex Villa — VR Experience</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    body { margin:0; overflow:hidden; background:#000; }

    #hud {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
      z-index:999; display:flex; gap:20px; pointer-events:none;
      font-family:'Montserrat',sans-serif;
    }
    .hud-pill {
      background:rgba(8,11,15,0.75); border:1px solid rgba(201,168,76,0.3);
      color:rgba(201,168,76,0.85); font-size:9px; letter-spacing:0.3em;
      text-transform:uppercase; padding:7px 16px; backdrop-filter:blur(8px);
    }
    #back-btn {
      position:fixed; top:28px; left:32px; z-index:999;
      background:rgba(8,11,15,0.75); border:1px solid rgba(201,168,76,0.3);
      color:rgba(201,168,76,0.85); font-family:'Montserrat',sans-serif;
      font-size:9px; letter-spacing:0.3em; text-transform:uppercase;
      padding:10px 20px; cursor:pointer; backdrop-filter:blur(8px);
      text-decoration:none; transition:border-color .3s,color .3s;
    }
    #back-btn:hover { border-color:rgba(201,168,76,0.9); color:#e8c96d; }
    #room-label {
      position:fixed; top:28px; right:32px; z-index:999;
      background:rgba(8,11,15,0.75); border:1px solid rgba(201,168,76,0.3);
      color:rgba(201,168,76,0.85); font-family:'Montserrat',sans-serif;
      font-size:9px; letter-spacing:0.3em; text-transform:uppercase;
      padding:10px 20px; backdrop-filter:blur(8px);
    }
    #floor-nav {
      position:fixed; bottom:75px; right:32px; z-index:999;
      display:flex; flex-direction:column; gap:8px;
    }
    .floor-btn {
      background:rgba(8,11,15,0.75); border:1px solid rgba(201,168,76,0.3);
      color:rgba(201,168,76,0.85); font-family:'Montserrat',sans-serif;
      font-size:9px; letter-spacing:0.3em; text-transform:uppercase;
      padding:9px 18px; cursor:pointer; backdrop-filter:blur(8px);
      pointer-events:all; transition:border-color .3s,color .3s;
    }
    .floor-btn:hover  { border-color:rgba(201,168,76,0.9); color:#e8c96d; }
    .floor-btn.active { border-color:rgba(201,168,76,0.9); color:#e8c96d; background:rgba(201,168,76,0.15); }
  </style>
</head>
<body>

  <a href="index.html" id="back-btn">← Back</a>
  <div id="room-label">Exterior</div>
  <div id="hud">
    <div class="hud-pill">WASD — Move</div>
    <div class="hud-pill">Mouse — Look</div>
    <div class="hud-pill">Click — Lock</div>
  </div>
  <div id="floor-nav">
    <button class="floor-btn" id="btn-f2">▲ Floor 2</button>
    <button class="floor-btn" id="btn-f1">▲ Floor 1</button>
    <button class="floor-btn active" id="btn-f0">▼ Ground</button>
  </div>

  <a-scene
    fog="type:linear; color:#0a0e14; near:60; far:180"
    renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true"
    shadow="type:pcfsoft"
    vr-mode-ui="enabled:true"
  >

    <!-- ASSETS -->
    <a-assets timeout="60000">
      <img id="tex-concrete" src="assets/textures/concrete.jpg" crossorigin="anonymous"/>
      <img id="tex-marble"   src="assets/textures/marble.jpg"   crossorigin="anonymous"/>
      <img id="tex-wood"     src="assets/textures/wood.jpg"     crossorigin="anonymous"/>
      <img id="tex-grass"    src="assets/textures/grass.jpg"    crossorigin="anonymous"/>
      <img id="tex-tiles"    src="assets/textures/tiles.jpg"    crossorigin="anonymous"/>
      <img id="tex-roof"     src="assets/textures/roof.jpg"     crossorigin="anonymous"/>
      <a-asset-item id="model-tree" src="assets/models/tree.glb"></a-asset-item>
      <a-asset-item id="model-palm" src="assets/models/palm.glb"></a-asset-item>
    </a-assets>

    <!-- PLAYER -->
    <a-entity id="player" position="0 1.6 30" room-label>
      <a-camera
        look-controls="pointerLockEnabled:true; reverseMouseDrag:false"
        wasd-controls="enabled:true; acceleration:28"
        fov="75"
      >
        <a-ring color="#c9a84c" radius-inner="0.003" radius-outer="0.006"
                position="0 0 -0.5" opacity="0.6"></a-ring>
      </a-camera>
    </a-entity>

    <!-- LIGHTING -->
    <a-light type="ambient"     color="#2a3a4a" intensity="1.2"></a-light>
    <a-light type="directional" color="#b8cce8" intensity="1.2"
             position="-10 20 -10" cast-shadow="true"
             shadow-camera-left="-60" shadow-camera-right="60"
             shadow-camera-top="60" shadow-camera-bottom="-60"></a-light>

    <a-light type="point" color="#f5c87a" intensity="2.8" position="0 3.5 0"    distance="28"></a-light>
    <a-light type="point" color="#f5c87a" intensity="2.2" position="-7 3.5 0"   distance="22"></a-light>
    <a-light type="point" color="#f5c87a" intensity="2.2" position="7 3.5 0"    distance="22"></a-light>
    <a-light type="point" color="#f5e8c0" intensity="2.2" position="-3 8.5 -2"  distance="22"></a-light>
    <a-light type="point" color="#f5e8c0" intensity="2.0" position="5 8.5 -2"   distance="20"></a-light>
    <a-light type="point" color="#f5e0b0" intensity="2.0" position="0 13.5 0"   distance="22"></a-light>
    <a-light type="point" color="#00aaff" intensity="1.5" position="0 0.5 14"   distance="14"></a-light>

      animation="property:intensity; from:1.2; to:2.5; dur:400; dir:alternate; loop:true"></a-light>
    <a-light type="point" color="#fff5e0" intensity="1.5" position="14 3 3"     distance="12"></a-light>

               emissive="#fff8f0" emissive-intensity="0.15"></a-box>
        <!-- Main ceiling light -->
        <a-cylinder color="#fff5e0" radius="0.2" height="0.05" position="0 3.72 0"
                    emissive="#fff5e0" emissive-intensity="0.9"></a-cylinder>
        <a-light type="point" color="#fff5e0" intensity="1.6" position="0 3.5 0" distance="10"></a-light>
        <!-- Warm accent strip along vanity ceiling -->
        <a-box color="#ffe8b0" width="3.6" height="0.02" depth="0.1" position="0 3.72 -2.0"
               emissive="#ffe8b0" emissive-intensity="0.5"></a-box>
      </a-entity>

    </a-entity>
    <!-- end floor2 -->

  </a-scene>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      const player = document.getElementById('player');

      const floors = {
        f0: { pos: { x: 0,  y: 1.6,  z: 4  }, label: 'Ground Floor' },
        f1: { pos: { x: -4, y: 6.1,  z: 2  }, label: 'Floor 1'      },
        f2: { pos: { x: -5, y: 10.4, z: -1 }, label: 'Floor 2'      }
      };

      ['f0','f1','f2'].forEach(id => {
        const btn = document.getElementById('btn-' + id);
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          player.setAttribute('position', floors[id].pos);
          document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

    });

    AFRAME.registerComponent('room-label', {
      init: function () {
        this.labelEl  = document.getElementById('room-label');
        this.lastRoom = '';
      },
      tick: function () {
        const pos  = this.el.getAttribute('position');
        const room = this.getRoom(pos);
        if (room !== this.lastRoom) {
          this.labelEl.textContent = room;
          this.lastRoom = room;
        }
      },
      getRoom: function (pos) {
        const x = pos.x, y = pos.y, z = pos.z;
        if (y > 9.5) {
          if (x > 4 && z < -1)   return 'En-Suite Bathroom';
          if (x > 3)              return 'Bar Lounge';
          if (z > 6)              return 'Terrace';
          return 'Lounge';
        }
        if (y > 5.2) {
          if (z > 6)              return 'Balcony';
          if (x < -5 && z < -2)  return 'Walk-in Closet';
          if (x > 1)              return 'Second Bedroom';
          return 'Master Bedroom';
        }
        if (z > 20)                        return 'Fire Pit Lounge';
        if (z > 10 && z <= 20)             return 'Pool Deck';
        if (x > 8 && z > -2 && z < 8)     return 'Garage';
        if (x < 0 && z >= -6 && z <= 6)   return 'Living Room';
        if (x >= 0 && z >= -6 && z <= 6)  return 'Kitchen & Dining';
        return 'Exterior';
      }
    });
  </script>

</body>
</html>
